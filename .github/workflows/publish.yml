name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit --pretty false

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack core
        run: pnpm --filter @fifthrevision/axle pack --pack-destination artifacts/core

      - name: Pack CLI
        run: pnpm --filter @fifthrevision/axle-cli pack --pack-destination artifacts/cli

      - name: Publish core
        run: npm publish artifacts/core/*.tgz --access public

      - name: Publish CLI
        run: npm publish artifacts/cli/*.tgz --access public
